# V1.7 IR (Investor Relations) sources.
#
# Per-entity declarative configuration for non-SEC sources: company
# news / blog feeds. These complement SEC filings — same dedup pipeline
# absorbs overlap when the same deal appears in both.
#
# Two source types are supported:
#   - rss:        feed URL only (cheap to add; RssFeed adapter parses)
#   - ir_press:   per-site CSS-selector scraper (when no feed exists)
#
# All URLs were probed live before commit; mark TODO when no public
# feed exists rather than guessing selectors that will quietly break.

sources:
  # ---------- Hyperscalers ----------
  - entity_canonical_name: "Microsoft Corporation"
    type: rss
    # blogs.microsoft.com/ai/ has been stale since 2022; news.microsoft.com/source
    # is Microsoft's current corporate news feed.
    feed_url: "https://news.microsoft.com/source/feed/"
    publisher: "Microsoft Source"
    source_type: news

  - entity_canonical_name: "Alphabet Inc."
    type: rss
    feed_url: "https://blog.google/rss/"
    publisher: "Google Blog"
    source_type: blog

  - entity_canonical_name: "Amazon.com, Inc."
    type: rss
    feed_url: "https://www.aboutamazon.com/news/rss"
    publisher: "About Amazon"
    source_type: news

  - entity_canonical_name: "Meta Platforms, Inc."
    type: rss
    feed_url: "https://about.fb.com/news/feed/"
    publisher: "Meta Newsroom"
    source_type: news

  # ---------- Private AI labs (V1.9 Playwright path) ----------
  # Both OpenAI and Anthropic defeat the lightweight RSS/IR-press paths
  # (Cloudflare TLS fingerprinting + JS-rendered cards). The playwright
  # source spins up real Chromium per ingest run.

  - entity_canonical_name: "OpenAI"
    type: playwright
    index_url: "https://openai.com/news/"
    publisher: "OpenAI News"
    source_type: blog
    # Each article card is wrapped in an anchor pointing at /index/SLUG.
    # Filter to that prefix to skip the category-link sidebar (which uses
    # /news/<category>/ paths instead).
    item_selector: "a[href^='/index/']"
    article_body_selector: "main"
    link_base_url: "https://openai.com"

  - entity_canonical_name: "Anthropic"
    type: playwright
    index_url: "https://www.anthropic.com/news"
    publisher: "Anthropic Newsroom"
    source_type: blog
    # Article cards use /news/<slug>; the small set of /news/<category>
    # paths in the same selector are filterable by counting slashes if
    # they show up — for now the slug pattern is unambiguous enough.
    item_selector: "main a[href^='/news/']"
    article_body_selector: "article"
    link_base_url: "https://www.anthropic.com"

  # ---------- Chips / hardware ----------
  - entity_canonical_name: "NVIDIA Corporation"
    type: rss
    feed_url: "https://blogs.nvidia.com/feed/"
    publisher: "NVIDIA Blog"
    source_type: blog

  # ---------- Tooling / infra ----------
  - entity_canonical_name: "Hugging Face"
    type: rss
    feed_url: "https://huggingface.co/blog/feed.xml"
    publisher: "Hugging Face Blog"
    source_type: blog

  # NOTE: tier-2 sources (power utilities, DC infra, hardware OEMs, AI
  # cloud) are NOT hand-curated here. They're auto-discovered: each
  # ingest pass surfaces new counterparties via the open-world resolver,
  # then ``midas discover sources`` probes a small set of heuristic
  # URL patterns ({domain}/feed, /news/rss, /investors/rss, ...) and
  # persists validated sources to the ``discovered_source`` DB table.
  # ``midas ingest frontier`` runs the full loop: discover → ingest →
  # resolve → discover again, until no new sources land. The YAML
  # above is the *bootstrap* set — the rest grows automatically.
