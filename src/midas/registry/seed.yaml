# V1 AI-sector entity registry.
#
# Top-of-pyramid hyperscalers + AI labs + chip suppliers + cloud-adjacent
# infrastructure. Aliases must include any string the extractors will see in
# real prose (press releases, earnings calls), since entity resolution is a
# case-insensitive exact match against canonical_name + aliases.
#
# CIK is the SEC's central index key — required for SEC EDGAR fetches; only
# present on US public companies. Format: 10-char zero-padded.

entities:
  # ---------- Hyperscalers ----------
  - canonical_name: "Microsoft Corporation"
    aliases: ["Microsoft", "Microsoft Corp", "MSFT"]
    ticker: "MSFT"
    cik: "0000789019"
    entity_type: public_company
    sector_tags: ["ai", "cloud", "software"]
    country: "US"

  - canonical_name: "Alphabet Inc."
    aliases: ["Google", "Google LLC", "Alphabet", "GOOG", "GOOGL"]
    ticker: "GOOGL"
    cik: "0001652044"
    entity_type: public_company
    sector_tags: ["ai", "cloud", "advertising"]
    country: "US"

