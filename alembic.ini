# Alembic config for midas.
#
# The actual database URL is read from `midas.config.settings.database_url`
# inside `alembic/env.py`; the `sqlalchemy.url` value here is a placeholder
# that satisfies Alembic's config parser.

[alembic]
script_location = alembic
prepend_sys_path = . src
version_path_separator = os
sqlalchemy.url = postgresql+asyncpg://midas:midas@localhost:5432/midas

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
