services:
  postgres:
    image: postgres:16-alpine
    container_name: midas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: midas
      POSTGRES_PASSWORD: midas
      POSTGRES_DB: midas
    ports:
      - "5432:5432"
    volumes:
      - midas-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U midas -d midas"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  midas-pgdata:
