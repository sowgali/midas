services:
  postgres:
    image: postgres:16-alpine
    container_name: midas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: midas
      POSTGRES_PASSWORD: midas
      POSTGRES_DB: midas
    # Host 5433 -> container 5432 to avoid colliding with a native Postgres
    # install on the standard 5432.
    ports:
      - "5433:5432"
    volumes:
      - midas-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U midas -d midas"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  midas-pgdata:
